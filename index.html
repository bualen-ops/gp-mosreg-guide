<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карманный справочник объектов</title>
  <style>
    :root {
      --bg: #eef3fb;
      --card: #ffffff;
      --text: #16233b;
      --muted: #5a6b87;
      --accent: #1f4fbf;
      --line: #d7e1f1;
      --accent-soft: #e8f0ff;
      --header-bg: #f7faff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 12px;
    }
    h1 {
      font-size: 20px;
      margin: 8px 0 10px;
    }
    .controls {
      background: linear-gradient(180deg, var(--header-bg) 0%, #f3f7ff 100%);
      border: 1px solid #c9d8f0;
      border-radius: 14px;
      padding: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 6px 16px rgba(22, 35, 59, 0.06);
    }
    .filters-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .filters-grid .full {
      grid-column: 1 / -1;
    }
    input, select {
      width: 100%;
      font-size: 16px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #c8d6ef;
      margin-bottom: 0;
      background: #fff;
      color: var(--text);
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin: 6px 2px 2px;
    }
    .card {
      background: var(--card);
      border: 1px solid #cfdbf0;
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      box-shadow: 0 4px 14px rgba(18, 39, 79, 0.08);
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.35;
    }
    .chip {
      display: inline-block;
      font-size: 12px;
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid #b9ccf2;
      color: #183f8d;
      background: #e9f0ff;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .chip-progress {
      font-weight: 700;
      border-width: 1px;
    }
    .chip-progress.high {
      color: #0f6a2e;
      background: #e9f9ee;
      border-color: #9be2b1;
    }
    .chip-progress.mid {
      color: #8a5a00;
      background: #fff6de;
      border-color: #f2d37f;
    }
    .chip-progress.low {
      color: #a01414;
      background: #ffebeb;
      border-color: #f4aaaa;
    }
    .chip-progress.na {
      color: #475467;
      background: #eef2f6;
      border-color: #cfd8e3;
    }
    .row {
      margin-top: 4px;
      font-size: 14px;
      line-height: 1.4;
    }
    .section {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px dashed #d2def1;
    }
    .section-title {
      color: #274b88;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .expandable {
      display: inline;
    }
    .expandable .full {
      display: none;
    }
    .expandable[data-expanded="true"] .short {
      display: none;
    }
    .expandable[data-expanded="true"] .full {
      display: inline;
    }
    .toggle-btn {
      margin-left: 6px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #1a47a8;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }
    .k {
      color: var(--muted);
      margin-right: 4px;
    }
    .empty {
      color: var(--muted);
      background: var(--card);
      border: 1px dashed #ccd3e0;
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      text-align: center;
    }
    .selected-meta {
      margin-top: 6px;
      font-size: 13px;
      color: #1c3f7a;
    }
    .toolbar {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid #c0d0ec;
      background: #ffffff;
      color: #1a2f52;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn.primary {
      border-color: #9fbaf0;
      background: linear-gradient(180deg, #e8f0ff 0%, #d8e6ff 100%);
      color: #133d95;
      font-weight: 600;
    }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .card.selected {
      border-color: #8aa8e7;
      box-shadow: 0 0 0 2px rgba(31, 79, 191, 0.18), 0 6px 18px rgba(22, 35, 59, 0.12);
    }
    .card-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar .btn,
    .card-actions .btn {
      flex: 1 1 calc(50% - 4px);
      min-width: 0;
      text-align: center;
    }
    @media (min-width: 760px) {
      .filters-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .filters-grid .full {
        grid-column: 1 / -1;
      }
      .toolbar .btn,
      .card-actions .btn {
        flex: 0 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Карманный справочник объектов</h1>
    <p class="meta" style="margin-top:-4px;margin-bottom:8px;">
      <a href="dashboard.html" style="color:#1f4fbf;font-weight:600;">Сводка по регионам →</a>
    </p>
    <div class="controls">
      <div class="filters-grid">
        <input id="queryInput" class="full" type="search" placeholder="Поиск по названию, типу, коду...">
        <select id="regionSelect">
          <option value="">Все регионы</option>
        </select>
        <select id="yearSelect">
          <option value="">Все годы ввода</option>
        </select>
        <select id="objectTypeSelect">
          <option value="">Все типы объекта</option>
        </select>
        <select id="contractedSelect">
          <option value="">Законтрактовано: все</option>
          <option value="yes">Только законтрактованные</option>
          <option value="no">Только незаконтрактованные</option>
        </select>
      </div>
      <div class="toolbar">
        <button id="downloadSelectedBtn" type="button" class="btn primary" disabled>Скачать выбранную справку (.html)</button>
        <button id="downloadSelectedDocBtn" type="button" class="btn" disabled>Скачать .doc (legacy)</button>
      </div>
      <div class="selected-meta" id="selectedMeta">Объект не выбран</div>
      <div class="meta" id="summary">Загрузка данных...</div>
    </div>
    <div id="results"></div>
  </div>

  <script src="gp-shared.js"></script>
  <script>
    const { loadFromGoogleSheet, isContracted, normalizeObjectKey, normalizePercent } = window.GpGuide;

    const state = {
      items: [],
      filtered: [],
      regions: [],
      years: [],
      objectTypes: [],
      selectedObjectKey: "",
    };

    const queryInput = document.getElementById("queryInput");
    const regionSelect = document.getElementById("regionSelect");
    const yearSelect = document.getElementById("yearSelect");
    const objectTypeSelect = document.getElementById("objectTypeSelect");
    const contractedSelect = document.getElementById("contractedSelect");
    const downloadSelectedBtn = document.getElementById("downloadSelectedBtn");
    const downloadSelectedDocBtn = document.getElementById("downloadSelectedDocBtn");
    const selectedMeta = document.getElementById("selectedMeta");
    const results = document.getElementById("results");
    const summary = document.getElementById("summary");

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function safe(v) {
      if (v === null || v === undefined || v === "") return "—";
      return escapeHtml(v);
    }

    function createField(label, value, options = {}) {
      const text = value === null || value === undefined ? "" : String(value);
      const collapsible = Boolean(options.collapsible);
      const maxLength = options.maxLength || 140;

      if (!text.trim()) {
        return `<div class="row"><span class="k">${label}:</span>—</div>`;
      }

      if (collapsible && text.length > maxLength) {
        const shortText = `${escapeHtml(text.slice(0, maxLength).trim())}...`;
        const fullText = escapeHtml(text);
        return `<div class="row"><span class="k">${label}:</span><span class="expandable" data-expanded="false"><span class="short">${shortText}</span><span class="full">${fullText}</span><button class="toggle-btn" type="button">Показать полностью</button></span></div>`;
      }

      return `<div class="row"><span class="k">${label}:</span>${escapeHtml(text)}</div>`;
    }

    function createDocRows(item) {
      const rows = [
        ["Наименование объекта", item.objectName],
        ["ОМСУ", item.region],
        ["Тип объекта", item.objectType],
        ["Вид работ", item.workType],
        ["Вводные", item.intro],
        ["Срок реализации", item.timeline],
        ["Год ввода", item.commissioningYear],
        ["Готовность (%)", item.readinessPercent],
        ["Перенос срока", item.deadlineShift],
        ["Комментарий РП", item.managerComment],
        ["Комментарий (доп. источник)", item.extraComment],
        ["№ контракта", item.contractNumber],
        ["Дата заключения контракта", item.contractSignedAt],
        ["Подрядчик", item.contractor],
        ["РП (доп. источник)", item.extraManager],
        ["Наличие ПСД", item.psdAvailability],
        ["Наличие МОГЭ", item.mogeAvailability],
        ["План. дата выхода из МОГЭ", item.mogePlannedDate],
        ["№ МОГЭ", item.mogePositiveNumber],
        ["Сметная стоимость", item.estimateByMoge],
        ["в т.ч. ПИР", item.pirPart],
        ["Лимит 2025-2028", item.limit2025to2028],
        ["Итого 2026", item.total2026],
        ["Субсидия", item.subsidy],
        ["Фед. субсидия", item.federalSubsidy],
        ["Охват", item.coverage],
        ["Мощность (куб.м./сут)", item.capacityPerDay],
        ["Протяженность (м)", item.lengthMeters],
      ];

      return rows
        .map(([k, v]) => `<tr><td style="padding:6px 8px;border:1px solid #cfd8e3;background:#f7f9fe;"><b>${escapeHtml(k)}</b></td><td style="padding:6px 8px;border:1px solid #cfd8e3;">${safe(v)}</td></tr>`)
        .join("");
    }

    function buildReportHtml(item) {
      return `<!doctype html><html><head><meta charset="utf-8"><title>Справка по объекту</title></head><body><h2>Справка по объекту</h2><p><b>Дата формирования:</b> ${new Date().toLocaleString("ru-RU")}</p><table style="border-collapse:collapse;width:100%;font-family:Segoe UI,Arial,sans-serif;font-size:12pt;">${createDocRows(item)}</table></body></html>`;
    }

    function downloadHtmlForItem(item) {
      if (!item) return;
      const fileNameBase = String(item.objectName || "spravka")
        .replace(/[\\/:*?"<>|]/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, 80);
      const html = buildReportHtml(item);
      const blob = new Blob(["\ufeff", html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${fileNameBase || "spravka"}.html`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function downloadDocForItem(item) {
      if (!item) return;
      const fileNameBase = String(item.objectName || "spravka")
        .replace(/[\\/:*?"<>|]/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, 80);
      const html = buildReportHtml(item);
      const blob = new Blob(["\ufeff", html], { type: "application/msword" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${fileNameBase || "spravka"}.doc`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function updateSelectedMeta() {
      const selected = state.items.find((x) => normalizeObjectKey(x.objectName) === state.selectedObjectKey);
      if (!selected) {
        selectedMeta.textContent = "Объект не выбран";
        downloadSelectedBtn.disabled = true;
        downloadSelectedDocBtn.disabled = true;
        return;
      }
      selectedMeta.textContent = `Выбран: ${selected.objectName}`;
      downloadSelectedBtn.disabled = false;
      downloadSelectedDocBtn.disabled = false;
    }

    function progressChip(value) {
      const percent = normalizePercent(value);
      if (percent === null) {
        return `<span class="chip chip-progress na">Готовность: н/д</span>`;
      }

      let cls = "low";
      if (percent >= 80) cls = "high";
      else if (percent >= 40) cls = "mid";

      const text = Number.isInteger(percent) ? `${percent}%` : `${percent.toFixed(1)}%`;
      return `<span class="chip chip-progress ${cls}">Готовность: ${text}</span>`;
    }

    function renderCards(items) {
      if (!items.length) {
        results.innerHTML = `<div class="empty">Ничего не найдено. Попробуйте изменить запрос или регион.</div>`;
        return;
      }

      results.innerHTML = items.map((it) => `
        <article class="card ${state.selectedObjectKey === normalizeObjectKey(it.objectName) ? "selected" : ""}" data-object-key="${normalizeObjectKey(it.objectName)}">
          <div class="title">${safe(it.objectName)}</div>
          <div>
            <span class="chip">${safe(it.region)}</span>
            <span class="chip">${safe(it.objectType)}</span>
            ${progressChip(it.readinessPercent)}
          </div>
          <div class="section">
            <div class="section-title">Статус</div>
            ${createField("Готовность (%)", it.readinessPercent)}
            ${createField("Перенос срока", it.deadlineShift)}
            ${createField("Срок реализации", it.timeline)}
            ${createField("Год ввода", it.commissioningYear)}
          </div>

          <div class="section">
            <div class="section-title">Комментарий</div>
            ${createField("Комментарий РП", it.managerComment, { collapsible: true, maxLength: 180 })}
            ${createField("Комментарий (доп. источник)", it.extraComment, { collapsible: true, maxLength: 180 })}
          </div>

          <div class="section">
            <div class="section-title">Профиль объекта</div>
            ${createField("Вид работ", it.workType, { collapsible: true })}
            ${createField("Вводные", it.intro, { collapsible: true })}
          </div>

          <div class="section">
            <div class="section-title">Контракт</div>
            ${createField("№ контракта", it.contractNumber)}
            ${createField("Дата заключения контракта", it.contractSignedAt)}
            ${createField("Подрядчик", it.contractor, { collapsible: true, maxLength: 180 })}
            ${createField("РП (доп. источник)", it.extraManager)}
          </div>

          <div class="section">
            <div class="section-title">Экспертиза</div>
            ${createField("Наличие ПСД", it.psdAvailability)}
            ${createField("Наличие МОГЭ", it.mogeAvailability)}
            ${createField("План. дата выхода из МОГЭ", it.mogePlannedDate)}
            ${createField("№ МОГЭ", it.mogePositiveNumber)}
          </div>

          <div class="section">
            <div class="section-title">Финансы и показатели</div>
            ${createField("Сметная стоимость", it.estimateByMoge)}
            ${createField("в т.ч. ПИР", it.pirPart)}
            ${createField("Лимит 2025-2028", it.limit2025to2028)}
            ${createField("Итого 2026", it.total2026)}
            ${createField("Субсидия", it.subsidy)}
            ${createField("Фед. субсидия", it.federalSubsidy)}
            ${createField("Охват", it.coverage)}
            ${createField("Мощность (куб.м./сут)", it.capacityPerDay)}
            ${createField("Протяженность (м)", it.lengthMeters)}
          </div>
          <div class="card-actions">
            <button type="button" class="btn" data-action="select-card" data-object-key="${normalizeObjectKey(it.objectName)}">Выбрать объект</button>
            <button type="button" class="btn primary" data-action="download-card" data-object-key="${normalizeObjectKey(it.objectName)}">Скачать справку (.html)</button>
            <button type="button" class="btn" data-action="download-card-doc" data-object-key="${normalizeObjectKey(it.objectName)}">.doc (legacy)</button>
          </div>
        </article>
      `).join("");
    }

    results.addEventListener("click", (event) => {
      const button = event.target.closest(".toggle-btn");
      if (button) {
        const container = button.closest(".expandable");
        if (!container) return;
        const expanded = container.getAttribute("data-expanded") === "true";
        container.setAttribute("data-expanded", expanded ? "false" : "true");
        button.textContent = expanded ? "Показать полностью" : "Свернуть";
      }

      const actionBtn = event.target.closest("[data-action]");
      if (!actionBtn) return;

      const objectKey = actionBtn.getAttribute("data-object-key");
      const item = state.items.find((x) => normalizeObjectKey(x.objectName) === objectKey);
      if (!item) return;

      const action = actionBtn.getAttribute("data-action");
      if (action === "select-card") {
        state.selectedObjectKey = objectKey;
        localStorage.setItem("pocketGuideSelectedObjectKey", objectKey);
        updateSelectedMeta();
        renderCards(state.filtered.slice(0, 250));
      } else if (action === "download-card") {
        state.selectedObjectKey = objectKey;
        localStorage.setItem("pocketGuideSelectedObjectKey", objectKey);
        updateSelectedMeta();
        downloadHtmlForItem(item);
      } else if (action === "download-card-doc") {
        state.selectedObjectKey = objectKey;
        localStorage.setItem("pocketGuideSelectedObjectKey", objectKey);
        updateSelectedMeta();
        downloadDocForItem(item);
      }
    });

    function applyFilters() {
      const query = queryInput.value.trim().toLowerCase();
      const region = regionSelect.value;
      const year = yearSelect.value;
      const objectType = objectTypeSelect.value;
      const contracted = contractedSelect.value;

      state.filtered = state.items.filter((item) => {
        const regionMatch = !region || item.region === region;
        const yearMatch = !year || String(item.commissioningYear) === year;
        const typeMatch = !objectType || item.objectType === objectType;
        const contractedMatch = !contracted
          || (contracted === "yes" && isContracted(item.contractNumber))
          || (contracted === "no" && !isContracted(item.contractNumber));
        const queryMatch = !query || (item.searchText && item.searchText.includes(query));
        return regionMatch && yearMatch && typeMatch && contractedMatch && queryMatch;
      });

      summary.textContent = `Найдено: ${state.filtered.length} из ${state.items.length}`;
      renderCards(state.filtered.slice(0, 250));
    }

    function initRegionOptions(regions) {
      const options = [`<option value="">Все регионы</option>`];
      for (const region of regions) {
        options.push(`<option value="${region}">${region}</option>`);
      }
      regionSelect.innerHTML = options.join("");
    }

    function initYearOptions(years) {
      const options = [`<option value="">Все годы ввода</option>`];
      for (const year of years) {
        options.push(`<option value="${year}">${year}</option>`);
      }
      yearSelect.innerHTML = options.join("");
    }

    function initObjectTypeOptions(objectTypes) {
      const options = [`<option value="">Все типы объекта</option>`];
      for (const objectType of objectTypes) {
        options.push(`<option value="${escapeHtml(objectType)}">${escapeHtml(objectType)}</option>`);
      }
      objectTypeSelect.innerHTML = options.join("");
    }

    async function init() {
      state.selectedObjectKey = localStorage.getItem("pocketGuideSelectedObjectKey") || "";
      try {
        const data = await loadFromGoogleSheet();
        state.items = data.items || [];
        state.regions = data.regions || [];
        state.years = data.years || [];
        state.objectTypes = Array.from(
          new Set(state.items.map((x) => x.objectType).filter((v) => v && String(v).trim() !== "11"))
        ).sort();
        initRegionOptions(state.regions);
        initYearOptions(state.years);
        initObjectTypeOptions(state.objectTypes);
        summary.textContent = `Загружено из Google Sheets: ${state.items.length} записей`;
        applyFilters();
        updateSelectedMeta();
      } catch (error) {
        try {
          const response = await fetch("./data.json");
          const data = await response.json();
          state.items = data.items || [];
          state.regions = data.regions || [];
          state.years = Array.from(new Set(state.items.map((x) => x.commissioningYear).filter((y) => y !== null && y !== undefined && y !== "")))
            .sort((a, b) => Number(a) - Number(b));
          state.objectTypes = Array.from(
            new Set(state.items.map((x) => x.objectType).filter((v) => v && String(v).trim() !== "11"))
          ).sort();
          initRegionOptions(state.regions);
          initYearOptions(state.years);
          initObjectTypeOptions(state.objectTypes);
          summary.textContent = `Google Sheets недоступен, загружен локальный data.json: ${state.items.length} записей`;
          applyFilters();
          updateSelectedMeta();
        } catch (fallbackError) {
          summary.textContent = "Ошибка загрузки данных";
          results.innerHTML = `<div class="empty">Не удалось загрузить данные ни из Google Sheets, ни из data.json.</div>`;
        }
      }
    }

    queryInput.addEventListener("input", applyFilters);
    regionSelect.addEventListener("change", applyFilters);
    yearSelect.addEventListener("change", applyFilters);
    objectTypeSelect.addEventListener("change", applyFilters);
    contractedSelect.addEventListener("change", applyFilters);
    downloadSelectedBtn.addEventListener("click", () => {
      const item = state.items.find((x) => normalizeObjectKey(x.objectName) === state.selectedObjectKey);
      if (!item) return;
      downloadHtmlForItem(item);
    });
    downloadSelectedDocBtn.addEventListener("click", () => {
      const item = state.items.find((x) => normalizeObjectKey(x.objectName) === state.selectedObjectKey);
      if (!item) return;
      downloadDocForItem(item);
    });
    init();
  </script>
</body>
</html>
